<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>THANKS — STRAPPED-IN</title>
<meta name="description" content="Thanks for the support — stay in touch with your instructor.">
<style>
  :root {
    --bg: #0f1115;
    --card: #14161c;
    --card2: #161922;
    --line: #20242b;
    --line2: #2e333b;
    --tx: #e8eaed;
    --mut: #8b8f98;
    --mut2: #6c7079;
    --dim: #5a5e66;
    --teal: #1d9e75;
    --tealT: #7fd9bd;
    --tealBg: #13241d;
    --tealLn: #1d4d3c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--tx);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    text-transform: uppercase;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .wrap {
    width: 100%;
    max-width: 430px;
    padding: 56px 22px calc(34px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
  }

  .tick {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--tealBg); border: 1px solid var(--tealLn);
    display: flex; align-items: center; justify-content: center;
    color: var(--tealT); font-size: 32px;
  }
  .big { font-size: 18px; font-weight: 600; letter-spacing: .12em; margin-top: 22px; text-align: center; }
  .small {
    font-size: 11px; color: var(--mut); letter-spacing: .1em;
    margin-top: 10px; text-align: center; line-height: 1.7;
  }

  .avatar {
    width: 54px; height: 54px; border-radius: 50%;
    background: var(--tealBg); border: 1px solid var(--tealLn);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 600; color: var(--tealT); letter-spacing: .06em;
    margin-top: 30px; overflow: hidden;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .name { font-size: 14px; font-weight: 600; letter-spacing: .1em; margin-top: 10px; }
  .sub { font-size: 10px; color: var(--mut2); letter-spacing: .1em; margin-top: 5px; }

  .divider {
    align-self: stretch; display: flex; align-items: center; gap: 12px;
    margin-top: 30px; color: var(--dim); font-size: 10px; letter-spacing: .16em;
  }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--line); }

  .socials {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    align-self: stretch; margin-top: 18px;
  }
  .social-btn {
    display: flex; align-items: center; justify-content: center;
    background: var(--card); color: var(--tx); text-decoration: none;
    border: 1px solid var(--line2); border-radius: 14px;
    padding: 15px 10px; font-size: 11px; font-weight: 600; letter-spacing: .12em;
    -webkit-tap-highlight-color: transparent;
  }
  .social-btn:active { background: var(--card2); }

  .foot {
    margin-top: auto; padding-top: 44px;
    font-size: 9.5px; color: var(--dim); letter-spacing: .14em; text-align: center;
  }
  .foot .brand { color: var(--mut2); font-weight: 600; }
</style>
</head>
<body>
<div class="wrap">
  <div class="tick">✓</div>
  <div class="big" id="headline">Thanks a lot!</div>
  <div class="small">Your support means a heap —<br>see you back on the mountain</div>

  <div class="avatar" id="avatar" style="display:none"></div>
  <div class="name" id="name"></div>
  <div class="sub" id="sub"></div>

  <div class="divider" id="socialDivider" style="display:none">Stay in touch</div>
  <div class="socials" id="socials"></div>

  <div class="foot"><span class="brand">Strapped-In</span><br>The snowsport instructor's toolkit</div>
</div>

<script>
  // ---- FALLBACK — used only when no live profile reaches this page ---------
  // The card page saves the instructor's current profile to localStorage on
  // this same domain, so profile edits in the app flow through automatically.
  // Fill these in as the safety net (e.g. in-app browsers that block storage).
  var FALLBACK = {
    n: 'Dave',
    r: 'Cardrona · Snowboard',
    w: '',            // WhatsApp digits incl. country code, e.g. '64211234567'
    i: '',            // Instagram handle without @
    e: '',            // public email
    b: ''             // Facebook username or full URL
  };
  // --------------------------------------------------------------------------

  function fromHash() {
    try {
      var h = location.hash.replace(/^#/, '');
      if (!h) return null;
      var b64 = h.replace(/-/g, '+').replace(/_/g, '/');
      while (b64.length % 4) b64 += '=';
      var bin = atob(b64);
      var pct = '';
      for (var i = 0; i < bin.length; i++) {
        pct += '%' + ('0' + bin.charCodeAt(i).toString(16)).slice(-2);
      }
      var p = JSON.parse(decodeURIComponent(pct));
      return p && p.n ? p : null;
    } catch (e) { return null; }
  }

  function fromStorage() {
    try {
      var raw = localStorage.getItem('strappedin.profile');
      var p = raw ? JSON.parse(raw) : null;
      return p && p.n ? p : null;
    } catch (e) { return null; }
  }

  var P = fromHash() || fromStorage() || FALLBACK;

  document.getElementById('name').textContent = P.n || '';
  document.getElementById('sub').textContent = P.r || '';

  var avatar = document.getElementById('avatar');
  if (P.n) {
    avatar.style.display = 'flex';
    avatar.textContent = P.n.slice(0, 2);
    if (P.p) {
      var img = new Image();
      img.onload = function () { avatar.textContent = ''; avatar.appendChild(img); };
      img.src = P.p;
      img.alt = P.n;
    }
  }

  var links = [];
  if (P.w) links.push({ label: 'WhatsApp', href: 'https://wa.me/' + P.w });
  if (P.i) links.push({ label: 'Instagram', href: 'https://instagram.com/' + P.i });
  if (P.e) links.push({ label: 'Email', href: 'mailto:' + P.e });
  if (P.b) {
    links.push({
      label: 'Facebook',
      href: /^https?:\/\//i.test(P.b) ? P.b : 'https://facebook.com/' + P.b
    });
  }
  if (links.length) {
    document.getElementById('socialDivider').style.display = 'flex';
    var wrap = document.getElementById('socials');
    links.forEach(function (l) {
      var a = document.createElement('a');
      a.className = 'social-btn';
      a.textContent = l.label.toUpperCase();
      a.href = l.href;
      a.target = '_blank';
      a.rel = 'noopener';
      wrap.appendChild(a);
    });
  }
</script>
</body>
</html>
