<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DAVE — STRAPPED-IN</title>
<meta name="description" content="Leave a quick review for your snowboard lesson with Dave at Cardrona.">
<style>
  /* Strapped-In visual language — caps everywhere, hierarchy via size/weight/colour. */
  :root {
    --bg: #0f1115;
    --card: #14161c;
    --card2: #161922;
    --line: #20242b;
    --line2: #2e333b;
    --tx: #e8eaed;
    --mut: #8b8f98;
    --mut2: #6c7079;
    --dim: #5a5e66;
    --teal: #1d9e75;
    --tealT: #7fd9bd;
    --tealBg: #13241d;
    --tealLn: #1d4d3c;
    --amberT: #f0b96b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--tx);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    text-transform: uppercase;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .wrap {
    width: 100%;
    max-width: 430px;
    padding: 40px 22px calc(34px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
  }

  .eyebrow { font-size: 11px; color: var(--tealT); letter-spacing: .18em; font-weight: 500; }
  .name { font-size: 26px; font-weight: 600; letter-spacing: .09em; margin-top: 12px; }
  .sub { font-size: 10.5px; color: var(--mut); letter-spacing: .1em; margin-top: 7px; }

  .avatar {
    width: 76px; height: 76px; border-radius: 50%;
    background: var(--tealBg);
    border: 1px solid var(--tealLn);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: 600; color: var(--tealT); letter-spacing: .06em;
    margin-bottom: 18px;
  }

  .stars { display: flex; gap: 10px; margin-top: 28px; }
  .stars button {
    background: none; border: none; cursor: pointer; padding: 4px;
    font-size: 34px; line-height: 1; color: var(--line2);
    transition: color .12s ease, transform .12s ease;
  }
  .stars button.lit { color: var(--amberT); }
  .stars button:active { transform: scale(1.15); }
  .stars-hint { font-size: 10px; color: var(--mut2); letter-spacing: .12em; margin-top: 12px; }

  form { align-self: stretch; margin-top: 22px; }
  .field {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--line2);
    border-radius: 14px;
    color: var(--tx);
    font-family: inherit;
    font-size: 14px;
    letter-spacing: .04em;
    padding: 14px 16px;
    margin-top: 12px;
    text-transform: none;
  }
  .field::placeholder { color: var(--mut2); text-transform: uppercase; font-size: 11px; letter-spacing: .1em; }
  .field:focus { outline: none; border-color: var(--tealLn); }
  textarea.field { min-height: 96px; resize: vertical; }

  .btn {
    display: block; width: 100%; text-align: center; text-decoration: none;
    border-radius: 14px; padding: 16px 18px; margin-top: 14px;
    font-size: 13px; font-weight: 600; letter-spacing: .12em;
    text-transform: uppercase; font-family: inherit;
    border: none; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary { background: var(--teal); color: #06130d; }
  .btn-primary:active { filter: brightness(1.1); }
  .btn-primary:disabled { background: var(--card2); color: var(--dim); cursor: default; }
  .btn-ghost {
    background: var(--card); color: var(--tx);
    border: 1px solid var(--line2);
  }
  .btn-ghost:active { background: var(--card2); }
  .btn-note { font-size: 10px; color: var(--mut2); letter-spacing: .1em; margin-top: 9px; text-align: center; }
  .form-err { font-size: 10.5px; color: var(--amberT); letter-spacing: .1em; margin-top: 10px; text-align: center; display: none; }

  .divider {
    align-self: stretch; display: flex; align-items: center; gap: 12px;
    margin-top: 26px; color: var(--dim); font-size: 10px; letter-spacing: .16em;
  }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--line); }

  .thanks { display: none; flex-direction: column; align-items: center; margin-top: 34px; }
  .thanks .tick {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--tealBg); border: 1px solid var(--tealLn);
    display: flex; align-items: center; justify-content: center;
    color: var(--tealT); font-size: 28px;
  }
  .thanks .big { font-size: 16px; font-weight: 600; letter-spacing: .12em; margin-top: 18px; }
  .thanks .small { font-size: 10.5px; color: var(--mut); letter-spacing: .1em; margin-top: 8px; text-align: center; line-height: 1.6; }
  .tipWrap { align-self: stretch; }

  .foot {
    margin-top: auto; padding-top: 40px;
    font-size: 9.5px; color: var(--dim); letter-spacing: .14em; text-align: center;
  }
  .foot .brand { color: var(--mut2); font-weight: 600; }
</style>
</head>
<body>
<div class="wrap">
  <div class="avatar" id="avatar"></div>
  <div class="eyebrow">How was your lesson?</div>
  <div class="name" id="name"></div>
  <div class="sub" id="resort"></div>

  <!-- review form (hidden after submit) -->
  <div id="reviewWrap" style="align-self:stretch;display:flex;flex-direction:column;align-items:center;">
    <div class="stars" id="stars" aria-label="Tap a star rating"></div>
    <div class="stars-hint" id="starsHint">Tap the stars to rate</div>

    <form id="reviewForm">
      <textarea class="field" name="comment" id="comment" placeholder="What stuck with you? (optional)"></textarea>
      <input class="field" type="text" name="student" id="student" placeholder="Your name (optional)">
      <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">
      <button class="btn btn-primary" type="submit" id="submitBtn" disabled>Send review</button>
      <div class="form-err" id="formErr">Couldn't send — check signal and try again</div>
    </form>
  </div>

  <!-- thank-you state -->
  <div class="thanks" id="thanks">
    <div class="tick">✓</div>
    <div class="big">Thanks for the review</div>
    <div class="small">It goes straight to your instructor —<br>see you back on the mountain</div>
  </div>

  <div class="tipWrap">
    <div class="divider" id="tipDivider">Enjoyed it?</div>
    <a class="btn btn-ghost" id="tipBtn" href="#">Say thanks with a tip</a>
    <div class="btn-note" id="tipNote">100% goes to your instructor</div>
  </div>

  <div class="foot"><span class="brand">Strapped-In</span><br>The snowsport instructor's toolkit</div>
</div>

<script>
  // ---- CONFIG — the only block you should need to edit -------------------
  var PROFILE = {
    name: 'Dave',
    resort: 'Cardrona · Snowboard',
    // Formspree endpoint — reviews arrive by email + in the Formspree dashboard.
    formspree: 'https://formspree.io/f/mbdngeyb',
    // Stripe Payment Link for tips. Leave as REPLACE_… and the tip section hides.
    tipUrl: 'REPLACE_WITH_STRIPE_PAYMENT_LINK'
  };
  // ------------------------------------------------------------------------

  var configured = function (v) { return v && v.indexOf('REPLACE_') !== 0; };

  document.getElementById('name').textContent = PROFILE.name;
  document.getElementById('resort').textContent = PROFILE.resort;
  document.getElementById('avatar').textContent = PROFILE.name.slice(0, 2);
  document.title = PROFILE.name.toUpperCase() + ' — STRAPPED-IN';

  // Stars — rating is required; submit unlocks once one is tapped.
  var rating = 0;
  var starsWrap = document.getElementById('stars');
  var submitBtn = document.getElementById('submitBtn');
  for (var i = 1; i <= 5; i++) {
    (function (n) {
      var b = document.createElement('button');
      b.type = 'button';
      b.textContent = '★';
      b.setAttribute('aria-label', n + ' star' + (n > 1 ? 's' : ''));
      b.addEventListener('click', function () {
        rating = n;
        var kids = starsWrap.children;
        for (var k = 0; k < kids.length; k++) kids[k].classList.toggle('lit', k < n);
        document.getElementById('starsHint').textContent = n + ' / 5';
        submitBtn.disabled = false;
      });
      starsWrap.appendChild(b);
    })(i);
  }

  // Submit → Formspree (AJAX, no redirect — thank-you swaps in on this page).
  document.getElementById('reviewForm').addEventListener('submit', function (e) {
    e.preventDefault();
    if (!rating) return;
    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending…';
    document.getElementById('formErr').style.display = 'none';

    fetch(PROFILE.formspree, {
      method: 'POST',
      headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
      body: JSON.stringify({
        instructor: PROFILE.name,
        rating: rating + ' / 5',
        comment: document.getElementById('comment').value || '(none)',
        student: document.getElementById('student').value || '(anonymous)'
      })
    }).then(function (r) {
      if (!r.ok) throw new Error('send failed');
      document.getElementById('reviewWrap').style.display = 'none';
      document.getElementById('thanks').style.display = 'flex';
    }).catch(function () {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send review';
      document.getElementById('formErr').style.display = 'block';
    });
  });

  // Tip section — hidden entirely until a Stripe link is configured.
  if (configured(PROFILE.tipUrl)) {
    document.getElementById('tipBtn').href = PROFILE.tipUrl;
  } else {
    document.getElementById('tipDivider').style.display = 'none';
    document.getElementById('tipBtn').style.display = 'none';
    document.getElementById('tipNote').style.display = 'none';
  }
</script>
</body>
</html>
